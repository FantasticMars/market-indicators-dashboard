name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Python tests
        run: python -B -m unittest tests.test_server_sources

      - name: Check Python syntax
        run: |
          python -B -m py_compile server.py
          python -B -m py_compile scripts/fetch_quotes_json.py

      - name: Run Node tests
        run: node --test tests/*.test.mjs

      - name: Check JavaScript syntax
        run: |
          node --check app.js
          node --check model.js
          node --check scripts/generate-static-snapshot.mjs
